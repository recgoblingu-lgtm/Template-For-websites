<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 - Page Not Found</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,Helvetica,sans-serif;
}

body{
    background:#0d1117;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    overflow:hidden;
}

/* Animated Background */

body::before{
    content:"";
    position:absolute;
    inset:0;
    background:
        radial-gradient(circle at top left,#58a6ff33,transparent 40%),
        radial-gradient(circle at bottom right,#1f6feb33,transparent 40%);
    animation:moveBg 8s ease-in-out infinite alternate;
    z-index:-1;
}

@keyframes moveBg{
    from{
        transform:scale(1) rotate(0deg);
    }
    to{
        transform:scale(1.1) rotate(3deg);
    }
}

.container{
    text-align:center;
    max-width:700px;
    padding:40px;
}

.error{
    font-size:120px;
    font-weight:bold;
    color:#58a6ff;
    text-shadow:0 0 20px rgba(88,166,255,.5);
}

h1{
    margin-top:10px;
    font-size:38px;
}

p{
    margin-top:20px;
    color:#b5b5b5;
    line-height:1.7;
}

.button{
    display:inline-block;
    margin-top:35px;
    padding:15px 35px;
    background:#58a6ff;
    color:white;
    text-decoration:none;
    border-radius:10px;
    transition:.3s;
}

.button:hover{
    transform:translateY(-3px);
    box-shadow:0 0 20px rgba(88,166,255,.5);
}

.links{
    margin-top:40px;
}

.links a{
    color:#58a6ff;
    margin:0 12px;
    text-decoration:none;
}

.links a:hover{
    text-decoration:underline;
}
</style>
</head>

<body>

<div class="container">

<div class="error">
404
</div>

<h1>Oops! This page doesn't exist.</h1>

<p>
The page you're looking for may have been moved, renamed, or deleted.
Use the links below or return to the homepage.
</p>

<a class="button" href="index.html">
🏠 Return Home
</a>

<div class="links">

<a href="features.html">Features</a>
<a href="downloads.html">Downloads</a>
<a href="news.html">News</a>
<a href="discord.html">Discord</a>
<a href="contact.html">Contact</a>

</div>

</div>

</body>
</html>
